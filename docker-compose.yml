version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: englishbuddy
      POSTGRES_PASSWORD: englishbuddy
      POSTGRES_DB: englishbuddy
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U englishbuddy"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://englishbuddy:englishbuddy@db:5432/englishbuddy
      REDIS_URL: redis://redis:6379/0
      FILES_ROOT: /app/files
      SECRET_KEY: supersecretkey-change-in-production-32chars
      ENVIRONMENT: development
      CORS_ORIGINS: "https://localhost:5173,https://192.168.0.82:5173,https://192.168.0.80:5173,http://localhost:5173,http://localhost:3000,http://192.168.0.82:5173,http://192.168.0.80:5173"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - filedata:/app/files
    command: >
      sh -c "
      alembic upgrade head &&
      python seed.py &&
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload
      "

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://englishbuddy:englishbuddy@db:5432/englishbuddy
      REDIS_URL: redis://redis:6379/0
      FILES_ROOT: /app/files
      SECRET_KEY: supersecretkey-change-in-production-32chars
      ENVIRONMENT: development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - filedata:/app/files
    command: celery -A app.workers.celery_app worker --loglevel=info -Q default,cpu

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://api:8000
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  pgdata:
  filedata:
